services:
  # ── MQTT Broker (Secured) ────────────────────────────────
  # Mosquitto with TLS + username/password authentication
  #   - WSS on port 8884: Sensor Logger connects here
  #   - TCP+TLS on port 8883: Python server connects here
  #   - No plaintext listeners
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: signal-to-sleep-mqtt
    ports:
      - "8884:8884"   # WSS (TLS) — Sensor Logger
      - "8885:8885"   # WS (no TLS) — Sensor Logger fallback
      - "8883:8883"   # TCP+TLS — internal Python client
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd
      - ./mosquitto/certs:/mosquitto/certs:ro
      - ./mosquitto/entrypoint.sh:/entrypoint.sh:ro
      - mosquitto-data:/mosquitto/data
    entrypoint: /entrypoint.sh
    restart: unless-stopped

  # ── Signal-to-Sleep Backend API ─────────────────────────
  backend:
    build: ./backend
    container_name: signal-to-sleep-api
    volumes:
      - sleep-data:/app/db
      - ./mosquitto/certs:/app/mosquitto/certs:ro
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 1536M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - mosquitto
    restart: unless-stopped

  # ── Signal-to-Sleep Frontend UI ─────────────────────────
  frontend:
    build: ./frontend
    container_name: signal-to-sleep-ui
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sleep-data:
  mosquitto-data:
