services:
  # ── MQTT Broker ─────────────────────────────────────────
  # Mosquitto with username/password authentication
  #   - WebSocket on port 1884: all clients connect here
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: signal-to-sleep-mqtt
    ports:
      - "1884:1884"   # WebSocket — Sensor Logger + backend
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd
      - ./mosquitto/entrypoint.sh:/entrypoint.sh:ro
      - mosquitto-data:/mosquitto/data
    entrypoint: /entrypoint.sh
    restart: unless-stopped

  # ── Signal-to-Sleep Backend API ─────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: signal-to-sleep-api
    volumes:
      - sleep-data:/app/db
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 1536M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - mosquitto
    restart: unless-stopped

  # ── Signal-to-Sleep Frontend UI ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: signal-to-sleep-ui
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sleep-data:
  mosquitto-data:
