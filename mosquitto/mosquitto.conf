# ─────────────────────────────────────────────────────────────
# Mosquitto MQTT Broker — Signal-to-Sleep (Secured)
# ─────────────────────────────────────────────────────────────
#
# Two listeners:
#   1. WSS (WebSocket + TLS) on port 8884 — Sensor Logger connects here
#   2. TCP + TLS on port 8883 — internal Python MQTT client connects here
#
# Authentication: username/password required on all listeners
# Encryption: TLS on all listeners (no plaintext connections)
# ─────────────────────────────────────────────────────────────

# ── Persistence ────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ────────────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true

# ── Authentication ─────────────────────────────────────────
# Reject anonymous connections — username/password required
allow_anonymous false
password_file /mosquitto/config/passwd

# ── Listener 1: WSS (WebSocket + TLS) for Sensor Logger ───
# Sensor Logger connects here: wss://<host>:8884
listener 8884
protocol websockets

# TLS configuration
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
tls_version tlsv1.2

# ── Listener 3: WS (WebSocket, no TLS) for Sensor Logger ──
# Fallback if the app rejects self-signed certs
# Sensor Logger connects here: ws://<host>:8885
listener 8885
protocol websockets

# ── Listener 2: TCP + TLS for internal Python client ──────
# The Signal-to-Sleep server connects here over encrypted TCP
listener 8883
protocol mqtt

# Same TLS certs
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
tls_version tlsv1.2
