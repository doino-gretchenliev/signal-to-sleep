# ─────────────────────────────────────────────────────────────
# Mosquitto MQTT Broker — Signal-to-Sleep
# ─────────────────────────────────────────────────────────────
#
# Single WebSocket listener on port 1884.
# All clients (Sensor Logger + backend) connect here.
#
# Authentication: username/password required
# ─────────────────────────────────────────────────────────────

# ── Persistence ────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ────────────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true

# ── Authentication ─────────────────────────────────────────
allow_anonymous false
password_file /mosquitto/config/passwd

# ── WebSocket listener ────────────────────────────────────
listener 1884
protocol websockets
